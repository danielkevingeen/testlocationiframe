<!DOCTYPE html>
<html>
<body>
    <h3>Teste de Localização no Iframe</h3>
    <button onclick="getLocation()">Clique para Testar GPS</button>
    <p id="status"></p>

    <script>
        function getLocation() {
            const status = document.getElementById('status');
            if (navigator.geolocation) {
                status.innerHTML = "Solicitando permissão...";
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        status.innerHTML = `Sucesso! Lat: ${pos.coords.latitude}, Lon: ${pos.coords.longitude}`;
                    },
                    (err) => {
                        status.innerHTML = `Erro: ${err.message} (Código: ${err.code})`;
                    }
                );
            } else {
                status.innerHTML = "Geolocalização não suportada neste navegador.";
            }
			
			console.log(document.featurePolicy.allowsFeature('geolocation'));
        }
    </script>
</body>
</html>
